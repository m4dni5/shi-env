# Kitty config — Mountain Twilight

# Font
font_family      monospace
font_size        11.0

# Cursor
cursor           #c9a227
cursor_shape     block

# Colors — dark mountain palette
foreground       #c8c8d4
background       #1a1a2e
selection_foreground #1a1a2e
selection_background #c9a227

# Normal colors
color0  #1a1a2e
color1  #c94427
color2  #5b8c5a
color3  #c9a227
color4  #4a6fa5
color5  #7b6b8a
color6  #5b8a8a
color7  #c8c8d4

# Bright colors
color8  #4a4a5e
color9  #e05535
color10 #6fa56e
color11 #dbb335
color12 #5a8ac0
color13 #9a84a0
color14 #6ea0a0
color15 #e0e0ea

# Background opacity — set to 0.9 for sway (no picom needed, sway handles compositing).
# Sway's for_window rule can override per-app; this is the base value.
background_opacity 0.9

# Window padding
window_padding_width 8

# Scrollback
scrollback_lines 5000

# Bell
enable_audio_bell no

# Tab bar
tab_bar_style fade
tab_fade 0.5 1.0
active_tab_foreground   #c9a227
active_tab_background   #1a1a2e
inactive_tab_foreground #4a4a5e
inactive_tab_background #14142a

# Window layout
enabled_layouts splits

# Remote control
allow_remote_control yes
listen_on unix:/tmp/kitty-ipc